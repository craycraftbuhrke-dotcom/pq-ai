services:
  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    build:
      context: ./services/api
      dockerfile: Dockerfile.experience
    environment:
      APP_NAME: ${APP_NAME:?APP_NAME is required}
      API_PREFIX: ${API_PREFIX:?API_PREFIX is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ACTOR_CACHE_TTL_SECONDS: ${ACTOR_CACHE_TTL_SECONDS:-60}
      SUMMARY_CACHE_TTL_SECONDS: ${SUMMARY_CACHE_TTL_SECONDS:-30}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:?API_CORS_ORIGINS is required}
      API_AUTH_ENABLED: "true"
      API_HOST: ${API_HOST:?API_HOST is required}
      API_PORT: ${API_PORT:?API_PORT is required}
    ports:
      - "${API_PUBLISH_PORT:?API_PUBLISH_PORT is required}:${API_PORT:?API_PORT is required}"
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    build:
      context: ./apps/web
      dockerfile: Dockerfile.experience
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      LISTEN_HOST: ${FRONTEND_HOSTNAME:?FRONTEND_HOSTNAME is required}
      PORT: ${FRONTEND_PORT:?FRONTEND_PORT is required}
      API_URL: ${API_URL:?API_URL is required}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      AUTH_ENABLED: "true"
      NEXT_PUBLIC_AUTH_ENABLED: "true"
      API_AUTH_ENABLED: "true"
    ports:
      - "${FRONTEND_PUBLISH_PORT:?FRONTEND_PUBLISH_PORT is required}:${FRONTEND_PORT:?FRONTEND_PORT is required}"
    depends_on:
      - api
