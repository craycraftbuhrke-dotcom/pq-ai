apiVersion: apps/v1
kind: Deployment
metadata:
  name: pq-ai-backend
  labels:
    app.kubernetes.io/name: pq-ai
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pq-ai
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pq-ai
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: pq-ai-backend:replace-by-ci
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_NAME
              value: PQ-AI
            - name: API_PREFIX
              value: /api/v1
            - name: API_HOST
              value: 0.0.0.0
            - name: API_PORT
              value: "8000"
            - name: API_AUTH_ENABLED
              value: "true"
            - name: ALLOW_SELF_REGISTRATION
              value: "false"
            - name: SEED_ON_STARTUP
              value: "false"
            - name: REDIS_URL
              value: redis://pq-ai-redis:6379/0
            - name: ACTOR_CACHE_TTL_SECONDS
              value: "60"
            - name: SUMMARY_CACHE_TTL_SECONDS
              value: "30"
            - name: API_CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: pq-ai-runtime-config
                  key: api-cors-origins
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pq-ai-runtime-secrets
                  key: database-url
          startupProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: pq-ai-backend
  labels:
    app.kubernetes.io/name: pq-ai
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: pq-ai
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
