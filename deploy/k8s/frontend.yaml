apiVersion: apps/v1
kind: Deployment
metadata:
  name: pq-ai-frontend
  labels:
    app.kubernetes.io/name: pq-ai
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pq-ai
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pq-ai
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: pq-ai-frontend:replace-by-ci
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: LISTEN_HOST
              value: 0.0.0.0
            - name: PORT
              value: "8080"
            - name: API_URL
              value: http://pq-ai-backend:8000/api/v1
            - name: API_AUTH_ENABLED
              value: "true"
            - name: AUTH_ENABLED
              value: "true"
            - name: NEXT_PUBLIC_AUTH_ENABLED
              value: "true"
            - name: NEXT_PUBLIC_ALLOW_SELF_REGISTRATION
              value: "false"
            - name: WEB_PUBLIC_DIR
              value: /workspace/apps/web/public
            - name: WEB_RUNTIME_ASSET_DIR
              value: /data/runtime-assets
            - name: BODY_MODEL_MAX_UPLOAD_BYTES
              value: "268435456"
          startupProbe:
            httpGet:
              path: /login
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: runtime-assets
              mountPath: /data/runtime-assets
      volumes:
        - name: runtime-assets
          persistentVolumeClaim:
            claimName: pq-ai-frontend-assets
---
apiVersion: v1
kind: Service
metadata:
  name: pq-ai-frontend
  labels:
    app.kubernetes.io/name: pq-ai
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/name: pq-ai
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
