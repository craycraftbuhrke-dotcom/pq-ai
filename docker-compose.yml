services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pq_ai}
      MYSQL_USER: ${MYSQL_USER:-pq_ai}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pq_ai_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_dev_password}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./services/api
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://pq_ai:pq_ai_dev_password@mysql:3306/pq_ai?charset=utf8mb4}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:3000}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      API_AUTH_ENABLED: ${API_AUTH_ENABLED:-true}
      BOOTSTRAP_API_KEY: ${BOOTSTRAP_API_KEY:-pq-ai-demo-key}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
    environment:
      API_URL: ${API_URL:-http://api:8000/api/v1}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      API_KEY: ${API_KEY:-pq-ai-demo-key}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mysql_data:
