services:
  mysql:
    image: ${MYSQL_IMAGE:?MYSQL_IMAGE is required}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    ports:
      - "${MYSQL_PORT:?MYSQL_PORT is required}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$${MYSQL_ROOT_PASSWORD}"
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: dockerfile.backed
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:?PYTHON_IMAGE is required}
    environment:
      APP_NAME: ${APP_NAME:?APP_NAME is required}
      API_PREFIX: ${API_PREFIX:?API_PREFIX is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:?API_CORS_ORIGINS is required}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:?SEED_DEMO_DATA is required}
      API_AUTH_ENABLED: ${API_AUTH_ENABLED:?API_AUTH_ENABLED is required}
      BOOTSTRAP_API_KEY: ${BOOTSTRAP_API_KEY:?BOOTSTRAP_API_KEY is required}
      API_HOST: ${API_HOST:?API_HOST is required}
      API_PORT: ${API_PORT:?API_PORT is required}
    ports:
      - "${API_PUBLISH_PORT:?API_PUBLISH_PORT is required}:${API_PORT:?API_PORT is required}"
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: dockerfile.frontend
      args:
        NODE_IMAGE: ${NODE_IMAGE:?NODE_IMAGE is required}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      LISTEN_HOST: ${FRONTEND_HOSTNAME:?FRONTEND_HOSTNAME is required}
      PORT: ${FRONTEND_PORT:?FRONTEND_PORT is required}
      API_URL: ${API_URL:?API_URL is required}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      API_KEY: ${API_KEY:?API_KEY is required}
    ports:
      - "${FRONTEND_PUBLISH_PORT:?FRONTEND_PUBLISH_PORT is required}:${FRONTEND_PORT:?FRONTEND_PORT is required}"
    depends_on:
      - api

volumes:
  mysql_data:
