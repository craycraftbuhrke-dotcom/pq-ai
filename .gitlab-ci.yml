stages:
  - scan
  - build
  - deploy

variables:
  NODE_IMAGE: "node:22-alpine"
  PYTHON_IMAGE: "python:3.11-slim"
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"
  SECRET_DETECTION_ENABLED: "true"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_BUILDKIT: "1"
  DOCKER_IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"
  FRONTEND_IMAGE: "${CI_REGISTRY_IMAGE}/frontend:${DOCKER_IMAGE_TAG}"
  BACKEND_IMAGE: "${CI_REGISTRY_IMAGE}/backend:${DOCKER_IMAGE_TAG}"
  FRONTEND_LATEST_IMAGE: "${CI_REGISTRY_IMAGE}/frontend:latest"
  BACKEND_LATEST_IMAGE: "${CI_REGISTRY_IMAGE}/backend:latest"
  KUBECTL_IMAGE: "alpine/k8s:1.31.6"

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

sast:
  stage: scan

secret_detection:
  stage: scan

frontend:scan:
  stage: scan
  image: ${NODE_IMAGE}
  script:
    - echo "Scanning frontend project ${CI_PROJECT_PATH}"
    - npm ci
    - npm run lint:web

backend:scan:
  stage: scan
  image: ${PYTHON_IMAGE}
  before_script:
    - cd services/api
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - echo "Scanning backend project ${CI_PROJECT_PATH}"
    - python -m compileall app tests
    - PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest

frontend:image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  needs:
    - frontend:scan
  before_script:
    - test -n "${CI_REGISTRY}"
    - test -n "${CI_REGISTRY_USER}"
    - test -n "${CI_REGISTRY_PASSWORD}"
    - test -n "${NODE_IMAGE}"
    - test -n "${NEXT_PUBLIC_API_URL}"
    # 方案1：生产前端镜像固定启用认证；CI 未配置时默认 true（与 dockerfile.frontend ARG 一致）
    - export NEXT_PUBLIC_AUTH_ENABLED="${NEXT_PUBLIC_AUTH_ENABLED:-true}"
    - test "${NEXT_PUBLIC_AUTH_ENABLED}" = "true"
    - echo "${CI_REGISTRY_PASSWORD}" | docker login -u "${CI_REGISTRY_USER}" --password-stdin "${CI_REGISTRY}"
  script:
    - echo "Building frontend image for ${CI_PROJECT_PATH} with dockerfile.frontend"
    - docker build --pull --build-arg NODE_IMAGE="${NODE_IMAGE}" --build-arg NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" --build-arg NEXT_PUBLIC_AUTH_ENABLED="${NEXT_PUBLIC_AUTH_ENABLED}" -f dockerfile.frontend -t "${FRONTEND_IMAGE}" -t "${FRONTEND_LATEST_IMAGE}" .
    - docker push "${FRONTEND_IMAGE}"
    - docker push "${FRONTEND_LATEST_IMAGE}"

backend:image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  needs:
    - backend:scan
  before_script:
    - test -n "${CI_REGISTRY}"
    - test -n "${CI_REGISTRY_USER}"
    - test -n "${CI_REGISTRY_PASSWORD}"
    - test -n "${PYTHON_IMAGE}"
    - echo "${CI_REGISTRY_PASSWORD}" | docker login -u "${CI_REGISTRY_USER}" --password-stdin "${CI_REGISTRY}"
  script:
    - echo "Building backend image for ${CI_PROJECT_PATH} with dockerfile.backend"
    - |
      if [ -n "${PIP_CONFIG_SECRET_FILE:-}" ]; then
        docker build --pull --build-arg PYTHON_IMAGE="${PYTHON_IMAGE}" --secret "id=pip_config,src=${PIP_CONFIG_SECRET_FILE}" -f dockerfile.backend -t "${BACKEND_IMAGE}" -t "${BACKEND_LATEST_IMAGE}" .
      else
        docker build --pull --build-arg PYTHON_IMAGE="${PYTHON_IMAGE}" -f dockerfile.backend -t "${BACKEND_IMAGE}" -t "${BACKEND_LATEST_IMAGE}" .
      fi
    - docker push "${BACKEND_IMAGE}"
    - docker push "${BACKEND_LATEST_IMAGE}"

.k8s-deploy:
  stage: deploy
  image:
    name: ${KUBECTL_IMAGE}
    entrypoint: [""]
  before_script:
    - test -n "${KUBE_CONTEXT}"
    - test -n "${K8S_NAMESPACE}"
    - kubectl config use-context "${KUBE_CONTEXT}"
    - kubectl auth can-i patch deployments.apps -n "${K8S_NAMESPACE}"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
    - when: never

backend:deploy:
  extends: .k8s-deploy
  needs:
    - backend:image
  script:
    - sed "s|pq-ai-backend:replace-by-ci|${BACKEND_IMAGE}|g" deploy/k8s/backend.yaml > /tmp/pq-ai-backend.yaml
    - kubectl -n "${K8S_NAMESPACE}" apply -f /tmp/pq-ai-backend.yaml
    - kubectl -n "${K8S_NAMESPACE}" rollout status deployment/pq-ai-backend --timeout=10m
  environment:
    name: production/backend

frontend:deploy:
  extends: .k8s-deploy
  needs:
    - frontend:image
  script:
    - sed "s|pq-ai-frontend:replace-by-ci|${FRONTEND_IMAGE}|g" deploy/k8s/frontend.yaml > /tmp/pq-ai-frontend.yaml
    - kubectl -n "${K8S_NAMESPACE}" apply -f /tmp/pq-ai-frontend.yaml
    - kubectl -n "${K8S_NAMESPACE}" rollout status deployment/pq-ai-frontend --timeout=10m
  environment:
    name: production/frontend
